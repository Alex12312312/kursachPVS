<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Сайт студенческой группы — Авторизация</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Авторизация</h1>
      <p>Эта страница отправляет форму на CGI-обработчик авторизации. Вход по email.</p>
      <form method="post" action="/cgi-bin/login.pl">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="ivanov@example.com" required />
        </div>
        <button class="btn" type="submit">Войти</button>
      </form>
    </section>
  </main>
</body>
</html>
